# This file is maintained by Tedium - manual edits will be overwritten!
name: CI
"on":
  - push
jobs:
  check-buf:
    runs-on: ubuntu-latest
    container:
      image: docker.io/bufbuild/buf:1.72.0@sha256:65bd496a89c762ad7151ca9e7d885a45dacb3671a8e8ec39738b9f844d3405ea
    steps:
      - uses: markormesher/ci-resources/setup@c733feb84c0204cdc0bd46f6f8ca557209bb5c33 # v0.8.0
      - run: ./task lint-buf
  check-go:
    runs-on: ubuntu-latest
    container:
      image: docker.io/golang:1.26.5@sha256:3aff6657219a4d9c14e27fb1d8976c49c29fddb70ba835014f477e1c70636647
    steps:
      - uses: markormesher/ci-resources/setup@c733feb84c0204cdc0bd46f6f8ca557209bb5c33 # v0.8.0
      - run: ./task deps-go
      - run: ./task lint-go
  check-js:
    runs-on: ubuntu-latest
    container:
      image: docker.io/node:25.9.0@sha256:78839ac448c23517f8eab2e8f7943d9b4f73979eb7f8bed2c73dbf72ff869e7b
    steps:
      - uses: markormesher/ci-resources/setup@c733feb84c0204cdc0bd46f6f8ca557209bb5c33 # v0.8.0
      - run: npm install -g --force yarn pnpm
      - run: ./task deps-js
      - run: ./task lint-js
  ci-all:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - check-buf
      - check-go
      - check-js
      - img-build-push
    container:
      image: docker.io/busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
    steps:
      - run: |2
          results=$(echo '${{ toJson(needs) }}' | (grep '"result"' || echo))
          if echo "$results" | grep -q "failure\|cancelled\|skipped"; then
            echo "One or more jobs failed, were cancelled, or were skipped" >&2
            exit 1
          fi
          echo "All jobs passed"
  img-build-push:
    runs-on: ubuntu-latest
    needs:
      - check-buf
      - check-go
      - check-js
    permissions:
      packages: write
    steps:
      - uses: markormesher/ci-resources/setup@c733feb84c0204cdc0bd46f6f8ca557209bb5c33 # v0.8.0
      - run: buildah login ghcr.io -u "${{ github.actor }}" -p "${{ github.token }}"
      - run: ./task imgrefs
      - run: ./task imgbuild
      - run: ./task imgpush
